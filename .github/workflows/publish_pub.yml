# Publishes the package to pub.dev when a GitHub release is created.
# Uses OIDC-based publishing — no credentials secret required.
# Setup: https://dart.dev/tools/pub/automated-publishing#github-actions

name: Publish package to pub.dev

on:
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Credentials
        uses: joutvhu/write-file@v1
        with:
          path: ~/.config/dart/pub-credentials.json
          contents: ${{ secrets.PUB_CREDENTIALS }}
          write_mode: overwrite

      - name: Install dependencies
        run: flutter pub get

      - name: Publish to pub.dev
        run: flutter pub publish --force
